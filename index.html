}
function logicDetails(loc){
  const ps=[1,2,3].map(n=>projectStress(loc,n));
  return `<details class="logic"><summary>Show logic details</summary><div class="detailGrid">${ps.map((p,i)=>`<div class="detailMonth"><div class="label">MONTH +${i+1}</div>${statusHtml(p.label)}<div class="metric"><span>under130</span><b>${p.under130}</b></div><div class="metric"><span>under50</span><b>${p.under50}</b></div><div class="metric"><span>maxConsecUnder50</span><b>${p.maxConsecUnder50}</b></div><div class="metric"><span>heat days &gt;35°C</span><b>${p.hotDays35}</b></div><div class="driver">${driverText(p)}</div><div class="window"><b>Window:</b> ${monthRange(p)}</div><div class="raw"><b>Rain:</b> ${rawRainText(loc,i+1)}</div></div>`).join('')}</div></details>`;
}
function rainfallSvg(loc){
  const w=330,h=150,l=28,r=10,t=12,b=28,plot=h-t-b,max=Math.max(150,...loc.rain.filter(v=>v!=null));
  const y=v=>t+plot-(Math.min(v,max)/max)*plot, bw=(w-l-r)/14-5, x=i=>l+i*((w-l-r)/14)+2.5;
  let s=`<svg viewBox="0 0 ${w} ${h}" role="img" aria-label="14-month rainfall bar chart">`;
  [[130,'stress'],[50,'severe']].forEach(([v,label])=>{let yy=y(v);s+=`<line x1="${l}" y1="${yy}" x2="${w-r}" y2="${yy}" stroke="${v==50?C.red:C.yellow}" stroke-dasharray="3 3" opacity=".65"/><text x="2" y="${yy+3}" font-size="9" fill="#667">${v}</text>`});
  loc.rain.forEach((v,i)=>{let xx=x(i), bh=v==null?2:Math.max(3,h-b-y(v)), yy=h-b-bh;
    s+=`<rect x="${xx}" y="${yy}" width="${bw}" height="${bh}" rx="3" fill="${rainColor(v)}"/><text x="${xx+bw/2}" y="${h-9}" text-anchor="middle" font-size="8" fill="#667">${mon(loc.months[i])}</text>`;});
  return s+`<line x1="${l}" y1="${h-b}" x2="${w-r}" y2="${h-b}" stroke="#ddd"/><text x="${w-62}" y="10" font-size="9" fill="#667">mm/month</text></svg>`;
}
function timelineSvg(loc){
  const w=330,h=102,x=t=>18+(t+14)/28*294, hx1=x(-14), hx2=x(-2);
  const stressed=harvestStress(loc)!='Stable';
  let s=`<svg viewBox="0 0 ${w} ${h}"><rect x="${hx1}" y="22" width="${hx2-hx1}" height="58" rx="6" fill="#DBEAFE" opacity=".65"/><text x="${hx1+6}" y="34" font-size="10" fill="#24548f" font-weight="700">Current harvest formed here</text>${stressed?`<line x1="${hx1+4}" y1="78" x2="${hx2-4}" y2="78" stroke="${C.yellow}" stroke-width="3" opacity=".7"/>`:''}<line x1="18" y1="52" x2="312" y2="52" stroke="#9d9688"/><text x="18" y="18" font-size="10" fill="#667">T-14</text><text x="158" y="18" font-size="10" fill="#111" font-weight="700">TODAY</text><text x="292" y="18" font-size="10" fill="#667">T+14</text><line x1="165" y1="24" x2="165" y2="84" stroke="#111" stroke-dasharray="3 3"/>`;
  loc.rain.slice(-14).forEach((v,i)=>{let xx=18+i*(294/13), glow=xx>=hx1&&xx<=hx2&&(v<130); if(v==null)return; if(v<50)s+=`${glow?`<rect x="${xx-9}" y="28" width="18" height="42" rx="5" fill="${C.red}" opacity=".12"/>`:''}<rect x="${xx-6}" y="34" width="12" height="36" rx="3" fill="${C.red}" opacity=".24"/>`; else if(v<130)s+=`${glow?`<circle cx="${xx}" cy="36" r="7" fill="${C.yellow}" opacity=".18"/>`:''}<circle cx="${xx}" cy="36" r="3" fill="${C.yellow}"/>`;});
  loc.days.forEach(d=>{let [t,temp]=d,xx=x(t); if(temp>35)s+=`<path d="M${xx} 68 l4 8 h-8 z" fill="${C.hot2}"/>`; else if(temp>33)s+=`<circle cx="${xx}" cy="72" r="3" fill="${C.hot}"/>`;});
  return s+`<text x="18" y="96" font-size="10" fill="#667">past actuals</text><text x="242" y="96" font-size="10" fill="#667">future window</text></svg>`;
}
function staleWarning(loc){
  return loc.stale?`<div class="staleWarn" title="${loc.stale_reason||'weather fetch failed; using cached data'}">⚠ Cached data — last fresh update: ${fmtDate(loc.updated)}</div>`:'';
}
function card(loc){
 const n=loc.now||{}, m=loc.metrics, harvest=stressCounts(loc);
 return `<section class="card"><div class="top"><div><h2>${loc.name}</h2><div class="small">${loc.country} · ${loc.id}</div><span class="risk ${loc.risk}">${loc.risk}</span></div><div class="stamp">updated<br>${fmtDate(loc.updated)}${staleWarning(loc)}</div></div><div class="insight">${loc.insight}</div><div class="cols"><div class="col"><div class="label">NOW</div><div class="big">${n.temp_c??'—'}°C</div><div class="small">Rain ${n.precip_mm??'—'} mm · RH ${n.humidity_pct??'—'}%</div></div><div class="col"><div class="label">HARVEST TODAY</div>${statusHtml(harvest.label)}<div class="driver">${driverText(harvest)}</div></div><div class="col next"><div class="label">NEXT 3 MONTHS</div>${next3Summary(loc)}</div></div>${logicDetails(loc)}<div class="chartTitle"><b>Monthly rainfall</b><span>&lt;50 red · 50–130 yellow · &gt;130 green</span></div>${rainfallSvg(loc)}<div class="chartTitle"><b>Timeline</b><span>dry blocks · heat markers</span></div>${timelineSvg(loc)}<div class="legend"><span><i class="sw" style="background:${C.red}"></i>&lt;50mm month</span><span><i class="sw" style="background:${C.yellow}"></i>50–130mm</span><span><i class="sw" style="background:${C.hot}"></i>&gt;33°C</span><span><i class="sw" style="background:${C.hot2}"></i>&gt;35°C</span></div><div class="foot">12-month counts: under130=${m.u130}, under50=${m.u50}, hot33=${m.h33}, hot38=${m.h38}</div></section>`;
}
document.getElementById('generatedStamp').textContent=`Rainfall, heat, and yield-risk view. Data generated ${fmtDate(DATA.generated_at)}`;
document.getElementById('app').innerHTML=DATA.locations.map(card).join('');
</script>
</body>
</html>
