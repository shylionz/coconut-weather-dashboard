<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Coconut Weather Dashboard</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 24px;
    }
    h1 {
      margin-bottom: 20px;
    }
    h2 {
      margin-top: 28px;
      padding-bottom: 6px;
      border-bottom: 2px solid #ddd;
    }
    .card {
      padding: 10px;
      margin: 8px 0;
      border: 1px solid #ccc;
      border-radius: 6px;
    }
    .alert {
      background-color: #ffe5e5;
    }
    .watch {
      background-color: #fff4e5;
    }
    .normal {
      background-color: #e5ffe5;
    }
    .title {
      font-weight: bold;
      margin-bottom: 6px;
    }
    .alert .title {
      color: #c00;
    }
    .watch .title {
      color: #f80;
    }
    .normal .title {
      color: #060;
    }
  </style>
</head>
<body>
  <h1>Coconut Weather Dashboard</h1>
  <div id="output">Loading...</div>

  <script>
    async function loadData() {
      try {
        const snapshot = await fetch('data/snapshot.json').then(r => r.json());
        const metrics = await fetch('data/metrics.json').then(r => r.json());

        const output = document.getElementById('output');
        output.innerHTML = '';

        const groups = {
          Alert: [],
          Watch: [],
          Normal: []
        };

        const combined = snapshot.locations.map(loc => {
          const m = metrics.locations.find(x => x.id === loc.id);
          if (!m) return null;

          return {
            region: loc.region,
            temp: loc.current.temp_c,
            status: m.status,
            rain: m.rainfall_30d,
            dry: m.current_dry_spell
          };
        }).filter(Boolean);

        combined.forEach(item => {
          if (groups[item.status]) {
            groups[item.status].push(item);
          }
        });

        Object.keys(groups).forEach(key => {
          groups[key].sort((a, b) => {
            if (b.dry !== a.dry) return b.dry - a.dry;
            return a.rain - b.rain;
          });
        });

        ['Alert', 'Watch', 'Normal'].forEach(status => {
          const section = document.createElement('div');

          const header = document.createElement('h2');
          header.textContent = status;
          section.appendChild(header);

          groups[status].forEach(item => {
            const card = document.createElement('div');
            card.className = 'card ' + status.toLowerCase();

            card.innerHTML =
              '<div class="title">' + item.region + ' | ' + item.status + '</div>' +
              '<div>Temp: ' + item.temp + '°C</div>' +
              '<div>Rainfall (30d): ' + item.rain + 'mm</div>' +
              '<div>Dry spell: ' + item.dry + ' days</div>';

            section.appendChild(card);
          });

          output.appendChild(section);
        });

      } catch (err) {
        document.getElementById('output').textContent = 'Error loading data';
        console.error(err);
      }
    }

    loadData();
  </script>
</body>
</html>
