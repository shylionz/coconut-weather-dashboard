 return `<section class="card"><div class="top"><div><h2>${loc.name}</h2><div class="small">${loc.country} · ${loc.id}</div><span class="risk ${loc.risk}">${loc.risk}</span></div><div class="stamp">updated<br>${fmtDate(loc.updated)}</div></div><div class="insight">${loc.insight}</div><div class="cols"><div class="col"><div class="label">NOW</div><div class="big">${n.temp_c??'—'}°C</div><div class="small">Rain ${n.precip_mm??'—'} mm · RH ${n.humidity_pct??'—'}%</div></div><div class="col"><div class="label">HARVEST TODAY</div><div class="small">Current harvest formed under:</div><div class="big" style="font-size:17px">${harvestStress(loc)}</div><div class="small">${stressCounts(loc).under130} months &lt;130mm · ${stressCounts(loc).under50} months &lt;50mm</div></div><div class="col"><div class="label">NEXT 3 MONTHS</div>${next3(loc)}</div></div><div class="chartTitle"><b>Monthly rainfall</b><span>&lt;50 red · 50–130 yellow · &gt;130 green</span></div>${rainfallSvg(loc)}<div class="chartTitle"><b>Timeline</b><span>dry blocks · heat markers</span></div>${timelineSvg(loc)}<div class="legend"><span><i class="sw" style="background:${C.red}"></i>&lt;50mm month</span><span><i class="sw" style="background:${C.yellow}"></i>50–130mm</span><span><i class="sw" style="background:${C.hot}"></i>&gt;33°C</span><span><i class="sw" style="background:${C.hot2}"></i>&gt;35°C</span></div><div class="foot">12-month counts: under130=${m.u130}, under50=${m.u50}, hot33=${m.h33}, hot38=${m.h38}</div></section>`;
}
document.getElementById('app').innerHTML=DATA.locations.map(card).join('');
</script>
