<!DOCTYPE html>
<html>
<head>
  <title>Coconut Weather Dashboard</title>
</head>
<body>
  <h1>Coconut Weather Dashboard</h1>
  <div id="output">Loading...</div>

  <script>
    async function loadData() {
      try {
        const snapshot = await fetch('data/snapshot.json').then(r => r.json());
        const metrics = await fetch('data/metrics.json').then(r => r.json());

        const output = document.getElementById('output');
        output.innerHTML = '';

        const combined = snapshot.locations.map(loc => {
          const m = metrics.locations.find(x => x.id === loc.id);
          if (!m) return null;

          return {
            region: loc.region,
            status: m.status,
            rain_30d: m.rainfall_30d,
            rain_180d: m.rainfall_180d,
            rain_270d: m.rainfall_270d,
            rain_365d: m.rainfall_365d,
            rainy_days_180d: m.rainy_days_180d,
            dry: m.current_dry_spell,
            hot_30d: m.hot_days_30d
          };
        }).filter(x => x !== null);

        const groups = { Alert: [], Watch: [], Normal: [] };
        combined.forEach(item => {
          if (groups[item.status]) groups[item.status].push(item);
        });

        // Sort within each section: highest dry spell first, then lowest rainfall_30d
        Object.keys(groups).forEach(key => {
          groups[key].sort((a, b) => {
            if (b.dry !== a.dry) return b.dry - a.dry;  // highest dry spell first
            return a.rain_30d - b.rain_30d;  // then lowest rainfall_30d
          });
        });

        const sectionOrder = ['Alert', 'Watch', 'Normal'];

        sectionOrder.forEach(status => {
          const section = document.createElement('div');
          
          const header = document.createElement('h2');
          header.textContent = status;
          header.style.cssText = 'margin-top: 20px; margin-bottom: 10px; border-bottom: 2px solid #ccc; padding-bottom: 5px; font-weight: bold;';
          section.appendChild(header);

          const container = document.createElement('div');
          
          groups[status].forEach(item => {
            const div = document.createElement('div');

            const bgColor =
              item.status === 'Alert' ? '#ffe5e5' :
              item.status === 'Watch' ? '#fff4e5' :
              '#e5ffe5';

            const textColor =
              item.status === 'Alert' ? '#c00' :
              item.status === 'Watch' ? '#f80' :
              '#060';

            // Calculate trend signal
            const avg_30d = item.rainfall_30d / 30;
            const avg_180d = item.rainfall_180d / 180;

            let trend = 'Stable';

            const stress30d = item.rainfall_30d < 100;
            const stress180d = item.rainfall_180d < 600;
            const dryStress = item.current_dry_spell >= 20;
            const heatStress = item.hot_days_30d >= 6;

            if (avg_30d < avg_180d * 0.8) {
              if (stress30d || stress180d || dryStress || heatStress) {
                trend = "Worsening";
              } else {
                trend = "Stable";
              }
            } else if (avg_30d > avg_180d * 1.2) {
              trend = "Recovering";
            }

            const trendColor =
              trend === "Worsening" ? "#c00" :
              trend === "Recovering" ? "#060" :
              "#555";

            div.innerHTML =
              '<div style="font-size: 18px; font-weight: bold; margin-bottom: 6px;">' +
              item.region +
              '<span style="float: right; font-size: 14px; font-weight: bold; ' +
              (item.status === "Alert" ? "color: #c00; background-color: #ffe5e5;" : 
               item.status === "Watch" ? "color: #f80; background-color: #fff4e5;" : 
               "color: #060; background-color: #e5ffe5;") +
              ' padding: 2px 8px; border-radius: 12px; border: 1px solid #ccc;">' +
              item.status +
              '</span>' +
              '</div>' +
              '<div style="font-size: 15px; color: #333; margin-top: 4px; margin-bottom: 8px; font-weight: bold;">' +
              riskInsight +
              '</div>' +
              '<div style="margin-top: 6px; margin-bottom: 6px; font-size: 14px; font-weight: bold;">' +
              '<span style="color: ' + trendColor + '">' +
              'Dry ' + item.current_dry_spell + 'd | Rain 30d: ' + item.rainfall_30d + ' mm | Heat: ' + item.hot_days_30d + ' days' +
              '</span>' +
              '</div>' +
              '<div style="margin-top: 6px; margin-bottom: 6px; font-size: 14px; font-weight: bold;">' +
              '<span style="color: ' + trendColor + '">' +
              '180d: ' + item.rainfall_180d + ' mm | 270d: ' + item.rainfall_270d + ' mm | 365d: ' + item.rainfall_365d + ' mm | <strong style="color: ' + trendColor + '">' + (trend === "Worsening" ? "↓ Worsening" : trend === "Recovering" ? "↑ Recovering" : "→ Stable") + '</strong>' +
              '</span>' +
              '</div>';

            container.appendChild(div);
          });

          section.appendChild(container);
          output.appendChild(section);
        });

      } catch (err) {
        document.getElementById('output').textContent = "Error loading data";
        console.error(err);
      }
    }

    loadData();
  </script>
</body>
</html>
